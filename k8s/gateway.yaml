apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsn-gateway
  labels:
    app: tsn-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tsn-gateway
  template:
    metadata:
      labels:
        app: tsn-gateway
    spec:
      containers:
        - name: tsn-gateway
          image: tsn-api:1.0
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: gateway
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tsn-gateway
spec:
  type: LoadBalancer
  selector:
    app: tsn-gateway
  ports:
    - port: 8080
      targetPort: 8080
