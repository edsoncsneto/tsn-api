apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsn-worker
  labels:
    app: tsn-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tsn-worker
  template:
    metadata:
      labels:
        app: tsn-worker
    spec:
      containers:
        - name: tsn-worker
          image: tsn-api:1.0
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_PROFILE
              value: worker
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tsn-worker
spec:
  type: ClusterIP
  selector:
    app: tsn-worker
  ports:
    - port: 8080
      targetPort: 8080
